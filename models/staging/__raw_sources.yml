version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: customers
        description: Raw customer data
        columns:
          - name: customer_id
            description: Unique customer identifier
            data_type: integer
          - name: name
            description: Customer name
            data_type: text
          - name: email
            description: Customer email address
            data_type: text
          - name: created_at
            description: Customer creation timestamp
            data_type: timestamp
