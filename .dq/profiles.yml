dbt_fab_spark:
  outputs:
    ephemeral_dev:
      authentication: vdstudio_oauth
      endpoint: https://msitapi.fabric.microsoft.com/v1
      workspaceid: "{{ env_var('WORKSPACE_ID') }}"
      workspace_name: "`{{ env_var('WORKSPACE_NAME') }}`"
      lakehouse: "`{{ env_var('LAKEHOUSE') }}`"
      lakehouseid: "{{ env_var('LAKEHOUSE_ID') }}"
      lakehouse_schemas_enabled: true
      schema: "{{ env_var('SCHEMA') }}"
      method: livy
      type: fabricspark
      reuse_livy_session: true
      session_id_file: ./.livy-session-id.txt
      spark_config:
        name: "{{ env_var('DBT_JOB_NAME') }}"
        driverCores: 4
        driverMemory: 28g
        executorCores: 4
        executorMemory: 28g
      connect_retries: 2
      connect_timeout: 500
      threads: 10

    ephemeral_dep:
      authentication: fabric_notebook
      endpoint: https://msitapi.fabric.microsoft.com/v1
      workspaceid: "{{ env_var('WORKSPACE_ID') }}"
      workspace_name: "`{{ env_var('WORKSPACE_NAME') }}`"
      lakehouse: "`{{ env_var('LAKEHOUSE') }}`"
      lakehouseid: "{{ env_var('LAKEHOUSE_ID') }}"
      lakehouse_schemas_enabled: true
      schema: "{{ env_var('SCHEMA') }}"
      method: livy
      type: fabricspark
      reuse_livy_session: true
      session_id_file: ./.livy-session-id.txt
      spark_config:
        name: "{{ env_var('DBT_JOB_NAME') }}"
        driverCores: 4
        driverMemory: 28g
        executorCores: 4
        executorMemory: 28g
      connect_retries: 2
      connect_timeout: 500
      threads: 10

    prod:
      authentication: fabric_notebook
      endpoint: https://msitapi.fabric.microsoft.com/v1
      workspaceid: '60983922-f74e-42f8-bb46-96514b5d25bd'
      workspace_name: '`ai_pro_wp`'
      lakehouse: '`ai_fork_lake`'
      lakehouseid: 'fb8d20b6-ffa8-4b1d-9663-bea2b18876c0'
      lakehouse_schemas_enabled: true
      schema: 'dbo'
      method: livy
      type: fabricspark
      reuse_livy_session: true
      session_id_file: ./.livy-session-id.txt
      spark_config:
        name: dbt_spark_job
        driverCores: 4
        driverMemory: 28g
        executorCores: 4
        executorMemory: 28g
      connect_retries: 2
      connect_timeout: 500
      threads: 10

  target: ephemeral_dev
